version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - revive
    - gocyclo
    - gocritic
    - misspell
    - godot
    - nilerr
    - prealloc
    - whitespace

  settings:
    gocyclo:
      min-complexity: 15
    godot:
      scope: declarations
      capital: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

issues:
  exclude-rules:
    - text: "Error return value of `.*Rollback` is not checked"
      linters: [errcheck]
